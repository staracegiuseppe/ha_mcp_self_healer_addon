name: HA MCP Self Healer
version: "0.2.13"
slug: ha_mcp_self_healer
description: MCP agent for Home Assistant log monitoring, conservative self-healing, and email reporting. Author Starace Giuseppe.
url: https://github.com/staracegiuseppe/ha_mcp_self_healer_addon
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
ingress: true
ingress_port: 8124
ingress_entry: /
panel_icon: mdi:robot
panel_title: HA Self Healer
homeassistant_api: true
hassio_api: true
hassio_role: manager
auth_api: true
options:
  ha_url: "http://supervisor/core"
  supervisor_url: "http://supervisor"
  ha_token: ""
  check_interval_seconds: 300
  dry_run: true
  auto_fix_enabled: true
  notify_on_noop: false
  create_backup_before_restart: true
  allow_homeassistant_restart: false
  allow_addon_restart: true
  allow_integration_reload: true
  allow_automation_disable: false
  allow_automation_restart: true
  allow_script_stop: true
  allow_browser_mod_cleanup: true
  allow_alexa_exposure_reload: true
  allow_mqtt_state_patch: true
  allow_update_install: true
  loop_monitor_enabled: true
  loop_window_minutes: 5
  loop_toggle_threshold: 8
  loop_automation_threshold: 6
  seen_ttl_hours: 6
  max_actions_per_cycle: 10
  ignored_patterns:
    - "No update available"
    - "Installing a specific version is not supported"
  email_enabled: false
  smtp_host: "smtp.gmail.com"
  smtp_port: 587
  smtp_tls: true
  smtp_user: ""
  smtp_password: ""
  email_from: ""
  email_to: ""
  oauth2_client_id: ""
  oauth2_client_secret: ""
  oauth2_refresh_token: ""
schema:
  ha_url: str
  supervisor_url: str
  ha_token: str
  check_interval_seconds: int
  dry_run: bool
  auto_fix_enabled: bool
  notify_on_noop: bool
  create_backup_before_restart: bool
  allow_homeassistant_restart: bool
  allow_addon_restart: bool
  allow_integration_reload: bool
  allow_automation_disable: bool
  allow_automation_restart: bool
  allow_script_stop: bool
  allow_browser_mod_cleanup: bool
  allow_alexa_exposure_reload: bool
  allow_mqtt_state_patch: bool
  allow_update_install: bool
  loop_monitor_enabled: bool
  loop_window_minutes: int
  loop_toggle_threshold: int
  loop_automation_threshold: int
  seen_ttl_hours: int
  max_actions_per_cycle: int
  ignored_patterns:
    - str
  email_enabled: bool
  smtp_host: str
  smtp_port: int
  smtp_tls: bool
  smtp_user: str
  smtp_password: password
  email_from: str
  email_to: str
  oauth2_client_id: str
  oauth2_client_secret: password
  oauth2_refresh_token: password
