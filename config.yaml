name: HA MCP Self Healer
version: "0.1.4"
slug: ha_mcp_self_healer
description: MCP agent for Home Assistant log monitoring, conservative self-healing, and email reporting.
url: https://github.com/staracegiuseppe/ha_mcp_self_healer_addon
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
startup: application
boot: auto
init: false
ingress: true
ingress_port: 8124
ingress_entry: /
panel_icon: mdi:robot
panel_title: HA Self Healer
homeassistant_api: true
hassio_api: true
hassio_role: manager
auth_api: true
options:
  ha_url: "http://supervisor/core"
  supervisor_url: "http://supervisor"
  ha_token: ""
  check_interval_seconds: 300
  dry_run: true
  auto_fix_enabled: true
  notify_on_noop: false
  create_backup_before_restart: true
  allow_homeassistant_restart: false
  allow_addon_restart: true
  allow_integration_reload: true
  max_actions_per_cycle: 3
  ignored_patterns: []
  email_enabled: false
  smtp_host: "smtp.gmail.com"
  smtp_port: 587
  smtp_tls: true
  smtp_user: ""
  smtp_password: ""
  email_from: ""
  email_to: ""
  oauth2_client_id: ""
  oauth2_client_secret: ""
  oauth2_refresh_token: ""
schema:
  ha_url: str
  supervisor_url: str
  ha_token: str
  check_interval_seconds: int
  dry_run: bool
  auto_fix_enabled: bool
  notify_on_noop: bool
  create_backup_before_restart: bool
  allow_homeassistant_restart: bool
  allow_addon_restart: bool
  allow_integration_reload: bool
  max_actions_per_cycle: int
  ignored_patterns:
    - str
  email_enabled: bool
  smtp_host: str
  smtp_port: int
  smtp_tls: bool
  smtp_user: str
  smtp_password: password
  email_from: str
  email_to: str
  oauth2_client_id: str
  oauth2_client_secret: password
  oauth2_refresh_token: password
